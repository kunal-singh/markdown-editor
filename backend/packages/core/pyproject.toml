[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "core"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "pydantic[email]>=2.0",
  "python-jose[cryptography]>=3.3",
  "passlib[argon2]>=1.7",
  "nh3>=0.2",
  "python-dotenv>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["core"]
